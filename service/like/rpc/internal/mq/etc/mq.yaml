Name: like-mq

Kafka:
  Name: like-mq-consumer
  Brokers:
    - kafka:9092
  Group: like-update-group
  Topic: like_promotion_topic
  Offset: first
  Consumers: 8

DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 9100
  MetricsPath: /metrics
  HealthPath: /healthz
  EnableMetrics: true
  EnablePprof: true

HotEventPusherConf:
  Brokers:
    - kafka:9092
  Topic: article-hot-events

Telemetry:
  Name: like-mq
  Endpoint: jaeger:4317
  Sampler: 1.0
  Batcher: otlpgrpc

DB:
  DataSource: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_ADDR}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable