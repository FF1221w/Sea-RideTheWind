Name: message.rpc
ListenOn: 0.0.0.0:8082
Etcd:
  Hosts:
  - etcd:2379
  Key: message.rpc

Log:
  ServiceName: message-rpc
  Mode: file
  Path: ../../../../log/message-rpc

Telemetry:
  Name: message-rpc
  Endpoint: jaeger:4317
  Sampler: 1.0
  Batcher: otlpgrpc

DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 16067
  MetricsPath: /metrics
  HealthPath: /healthz
  EnableMetrics: true
  EnablePprof: true

Postgres:
  Host: "postgres"
  Port: "5432"
  User: "admin"
  Password: "${POSTGRES_PASSWORD}"
  DBName: "first_db"
  Mode: "disable"

UserRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: user.rpc

AdminRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: admin.rpc

List:
  DefaultLimit: 20
  MaxLimit: 100

Broadcast:
  PageSize: 200
