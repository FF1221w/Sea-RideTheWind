Name: user.rpc
ListenOn: 0.0.0.0:9004

Log:
  ServiceName: user-rpc
  Mode: file
  Path: ../../../../log/user-rpc

Postgres:
  Host: "postgres"
  Port: "5432"
  User: "admin"
  Password: "${POSTGRES_PASSWORD}"
  DBName: "first_db"
  Mode: "disable"

BizRedis:
  Host: redis:6379
  Type: "node"
  Pass: ""
  

DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 9094
  MetricsPath: /metrics
  HealthPath: /healthz
  EnableMetrics: true
  EnablePprof: true


UserAuth:
  AccessSecret: ae0536f9-6450-4606-8e13-5a19ed505da0
  AccessExpire: 2592000

Telemetry:
  Name: user-rpc
  Endpoint: jaeger:4317
  Sampler: 1.0
  Batcher: otlpgrpc


Etcd:
  Hosts:
    - etcd:2379
  Key: user.rpc
