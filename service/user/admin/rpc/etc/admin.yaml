Name: admin.rpc
ListenOn: 0.0.0.0:8081

Log:
  ServiceName: admin-rpc
  Mode: file
  Path: ../../../../log/admin-rpc

Etcd:
  Hosts:
   - etcd:2379
  Key: admin.rpc

DataSource: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_ADDR}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable&TimeZone=Asia/Shanghai"

BizRedis:
  Host: redis:6379
  Type: "node"
  Pass: ""

Telemetry:
  Name: admin-rpc
  Endpoint: jaeger:4317
  Sampler: 1.0
  Batcher: otlpgrpc

AdminAuth:
  AccessSecret : "yU-hCm)2*?NQmWG"
  AccessExpire : 2592000

DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 9097
  MetricsPath: /metrics
  HealthPath: /healthz
  EnableMetrics: true
  EnablePprof: true

System:
  DefaultPassword : "123456"