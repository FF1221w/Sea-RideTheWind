Name: favorite.rpc
ListenOn: 0.0.0.0:8082

Log:
  ServiceName: favorite-rpc
  Mode: file
  Path: ../../../../log/favorite-rpc

Postgres:
  Host: "postgres"
  Port: "5432"
  User: "admin"
  Password: "${POSTGRES_PASSWORD}"
  DBName: "first_db"
  Mode: "disable"

Telemetry:
  Name: favorite-rpc
  Endpoint: jaeger:4317
  Sampler: 1.0
  Batcher: otlpgrpc

DevServer:
  Enabled: true
  Host: 0.0.0.0
  Port: 16062
  MetricsPath: /metrics
  HealthPath: /healthz
  EnableMetrics: true
  EnablePprof: true

Etcd:
  Hosts:
    - etcd:2379
  Key: favorite.rpc

UserRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: user.rpc

ArticleRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: article.rpc
