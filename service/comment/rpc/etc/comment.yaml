Name: comment.rpc
ListenOn: 0.0.0.0:9001
Etcd:
  Hosts:
    - etcd:2379
  Key: comment.rpc

DB:
  DataSource: "host=${POSTGRES_ADDR} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} port=${POSTGRES_PORT} sslmode=disable TimeZone=Asia/Shanghai"

Log:
  ServiceName: commentcenter
  Mode: file        
  Path: ../../../log/commentrpc

Telemetry:
  Name: comment-rpc
  Endpoint: jaeger:4317
  Sampler: 1.0
  Batcher: otlpgrpc


KqPusherConf:
  Brokers:
    - kafka:9092
  Topic: comment-audit-topic

KqConsumerConf:
  Brokers:
    - kafka:9092
  Group: comment-audit-group
  Topic: comment-audit-topic
  Offset: last
  Consumers: 8
  Name: ""

BizRedis:
  Host: redis:6379
  Type: node
  Pass: ""

MessageRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: message.rpc

ArticleRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: article.rpc
