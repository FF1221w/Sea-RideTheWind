syntax = "proto3";

package user;
option go_package = "./pb";

message UserInfo {
  int64 uid = 1;
  uint32 score = 2;
  string username = 3;
  string email = 4;
  map<string, string> extra_info = 5; //这里对应我们在数据库的json字段
}

message GetUserReq {
  int64 uid = 1;
}

message GetUserResp {
  UserInfo user = 1;
  bool found = 2;
}

message CreateUserReq {
  string username = 1;
  string password = 2;
  string email = 3;
  map<string, string> extra_info = 4;
}

message CreateUserResp {
  int64 uid = 1;
}

message LoginReq {
  string username = 1;
  string password = 2;
}

message LoginResp {
  int64 uid = 1;
  uint64 status = 2;
}

message LogoutReq {
  string token = 1;
}

message LogoutResp {
  bool success = 1;
}

message UpdateUserReq {
  int64 uid = 1;
  string username = 2;
  string password = 3;
  string email = 4;
  map<string, string> extra_info = 5;
}

message UpdateUserResp {
  UserInfo user = 1;
}

message AvatarHistoryItem {
  string id = 1;
  string avatar_url = 2;
  string content_type = 3;
  int64 size_bytes = 4;
  bool is_current = 5;
  string create_time = 6;
}

message UploadAvatarReq {
  int64 uid = 1;
  string avatar_url = 2;
  string content_type = 3;
  int64 size_bytes = 4;
}

message UploadAvatarResp {
  string avatar_url = 1;
  AvatarHistoryItem history = 2;
}

message GetAvatarHistoryReq {
  int64 uid = 1;
  int32 limit = 2;
}

message GetAvatarHistoryResp {
  repeated AvatarHistoryItem list = 1;
}

message SelectAvatarReq {
  int64 uid = 1;
  string history_id = 2;
}

message SelectAvatarResp {
  string avatar_url = 1;
  AvatarHistoryItem history = 2;
}

message DeleteUserReq {
  int64 uid = 1;
}

message DeleteUserResp {
  bool success = 1;
}

service UserService {
  rpc GetUser(GetUserReq) returns (GetUserResp);
  rpc Register(CreateUserReq) returns (CreateUserResp);
  rpc Login(LoginReq) returns (LoginResp);
  rpc Logout(LogoutReq) returns (LogoutResp);
  rpc UpdateUser(UpdateUserReq) returns (UpdateUserResp);
  rpc UploadAvatar(UploadAvatarReq) returns (UploadAvatarResp);
  rpc GetAvatarHistory(GetAvatarHistoryReq) returns (GetAvatarHistoryResp);
  rpc SelectAvatar(SelectAvatarReq) returns (SelectAvatarResp);
  rpc DeleteUser(DeleteUserReq) returns (DeleteUserResp);
}
